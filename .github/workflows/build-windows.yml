---
jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: |
          cd server
          bash build-windows.sh
      
      - uses: actions/upload-artifact@v4
        with:
          name: Remote-Control-Windows
          path: |
            server/RemoteControl.exe
            server/install.bat
            server/uninstall.bat
      
      - name: Zip for release
        run: |
          cd server
          Compress-Archive -Path RemoteControl.exe,install.bat,uninstall.bat -DestinationPath RemoteControl-Windows.zip
      
      - if: startsWith(github.ref, 'refs/tags/')
        name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: server/RemoteControl-Windows.zip
          generate_release_notes: true
name: Build Windows Executable
'on':
  push:
    tags:
      - windows-v*
  workflow_dispatch: 