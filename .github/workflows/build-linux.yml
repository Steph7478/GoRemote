---
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libx11-dev \
            libxtst-dev \
            pkg-config
      
      - name: Build
        run: |
          cd server
          bash build-linux.sh
      
      - uses: actions/upload-artifact@v4
        with:
          name: Remote-Control-Linux
          path: server/RemoteControl
name: Build Linux Executable
'on':
  workflow_dispatch: 